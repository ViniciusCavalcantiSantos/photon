# ==============================================================
# Photon – Development Docker Compose
# ==============================================================
# Usage:  docker compose up
# All defaults are baked in — no .env file required.
# Create a root .env only to override ports or passwords.
# ==============================================================

# ─── Shared Laravel Environment ─────────────────────────────
x-laravel-env: &laravel-env
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_DATABASE: "${DB_DATABASE:-photon}"
  DB_USERNAME: "${DB_USERNAME:-photon}"
  DB_PASSWORD: "${DB_PASSWORD:-12345678}"
  REDIS_HOST: "redis"
  REDIS_PASSWORD: "${REDIS_PASSWORD:-12345678}"
  REDIS_PORT: "6379"
  REDIS_PREFIX: "${REDIS_PREFIX:-photon}"

services:

  # ─── Nginx reverse proxy ────────────────────────────────────
  webserver:
    image: nginx:alpine
    ports:
      - "${FORWARD_APP_PORT:-8000}:80"
    volumes:
      - ./server/docker/nginx/conf.d/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./server:/var/www
      - ./server/public:/var/www/public
    depends_on:
      - app
    networks:
      - photon-network

  # ─── Laravel PHP-FPM ────────────────────────────────────────
  app:
    build:
      context: ./server
      dockerfile: docker/Dockerfile.dev
      args:
        WWWUSER: "${WWWUSER:-1000}"
        WWWGROUP: "${WWWGROUP:-1000}"
    working_dir: /var/www
    volumes:
      - ./server:/var/www
    environment:
      <<: *laravel-env
      PHP_IDE_CONFIG: "serverName=docker-xdebug"
      AUTO_MIGRATE: "true"
      CONTAINER_ROLE: "app"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - photon-network
    command: php-fpm

  # ─── Queue worker ──────────────────────────────────────────
  queue:
    build:
      context: ./server
      dockerfile: docker/Dockerfile.dev
      args:
        WWWUSER: "${WWWUSER:-1000}"
        WWWGROUP: "${WWWGROUP:-1000}"
    working_dir: /var/www
    volumes:
      - ./server:/var/www
    environment:
      <<: *laravel-env
      CONTAINER_ROLE: "worker"
    restart: always
    command: php artisan queue:listen --sleep=1 --tries=3
    depends_on:
      - app
    networks:
      - photon-network

  # ─── Task scheduler ────────────────────────────────────────
  scheduler:
    build:
      context: ./server
      dockerfile: docker/Dockerfile.dev
      args:
        WWWUSER: "${WWWUSER:-1000}"
        WWWGROUP: "${WWWGROUP:-1000}"
    working_dir: /var/www
    volumes:
      - ./server:/var/www
    environment:
      <<: *laravel-env
      CONTAINER_ROLE: "worker"
    restart: always
    command: php artisan schedule:work
    depends_on:
      - app
    networks:
      - photon-network

  # ─── SSE microservice (Go) ─────────────────────────────────
  sse:
    build:
      context: ./sse
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${FORWARD_SSE_PORT:-8080}:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-12345678}"
      REDIS_PREFIX: "${REDIS_PREFIX:-photon}"
      SSE_PORT: "8080"
      SSE_ALLOWED_ORIGINS: "${SSE_ALLOWED_ORIGINS:-http://localhost:3000}"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - photon-network

  # ─── MySQL ─────────────────────────────────────────────────
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root}"
      MYSQL_DATABASE: "${DB_DATABASE:-photon}"
      MYSQL_USER: "${DB_USERNAME:-photon}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-12345678}"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - photon-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-12345678}"
    volumes:
      - redis-data:/data
    networks:
      - photon-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-12345678}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Mailpit (dev mail) ────────────────────────────────────
  mailpit:
    image: axllent/mailpit:v1.29
    ports:
      - "${FORWARD_MAILPIT_PORT:-8025}:8025"
    networks:
      - photon-network
    environment:
      MP_MAX_MESSAGES: 5000

  # ─── MinIO (dev S3) ────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    ports:
      - "${FORWARD_MINIO_PORT:-9000}:9000"
      - "${FORWARD_MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minio}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minio12345}"
    volumes:
      - minio-data:/data
    networks:
      - photon-network

  minio-setup:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    depends_on:
      - minio
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minio} $${MINIO_ROOT_PASSWORD:-minio12345} &&
        mc mb -p local/${MINIO_BUCKET:-photon-dev} || true &&
        mc anonymous set download local/${MINIO_BUCKET:-photon-dev}
      "
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minio}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minio12345}"
    networks:
      - photon-network

  # ─── Composer utility ──────────────────────────────────────
  composer:
    build:
      context: ./server
      dockerfile: docker/Dockerfile.dev
      args:
        WWWUSER: "${WWWUSER:-1000}"
        WWWGROUP: "${WWWGROUP:-1000}"
    working_dir: /var/www
    volumes:
      - ./server:/var/www
    entrypoint: [ "composer", "--ansi", "--no-interaction", "--no-progress" ]
    profiles:
      - tools
    networks:
      - photon-network

volumes:
  mysql-data:
  redis-data:
  minio-data:
  client_node_modules:


networks:
  photon-network:
    driver: bridge
